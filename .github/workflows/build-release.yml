name: Build and Release emby-proxy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o dist/emby-proxy-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Generate sha256
        run: |
          cd dist
          sha256sum emby-proxy-${{ matrix.goos }}-${{ matrix.goarch }} > emby-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/emby-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/emby-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
